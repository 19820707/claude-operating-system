# Validates Claude OS integrity, schemas, skills, docs, bootstrap behavior, and runtime diagnostics.
name: bootstrap-validate

permissions:
  contents: read

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    # matrix.* is valid only at job level (not workflow-level concurrency).
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}-${{ matrix.os }}
      cancel-in-progress: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Tool versions (diagnostic)
        shell: pwsh
        run: |
          pwsh -NoProfile -Command '$PSVersionTable.PSVersion'
          git --version
          if (Get-Command bash -ErrorAction SilentlyContinue) { bash --version } else { Write-Host 'bash: not on PATH (expected on some Windows runners)' }

      - name: Manifest drift check
        shell: pwsh
        run: |
          $result = & $env:GITHUB_WORKSPACE/tools/sync-manifests.ps1 -WhatIf -Json | ConvertFrom-Json
          if ($result.findings[0].added -gt 0) {
            Write-Host "Manifest drift detected — the following are unlisted:"
            $result.findings[0].changes | ForEach-Object { Write-Host "  $_" }
            Write-Error "Run 'pwsh tools/sync-manifests.ps1' locally and commit the updated manifests."
            exit 1
          }
          Write-Host "Manifests in sync."

      - name: Profile quick (JSON artifact)
        shell: pwsh
        run: |
          $j = Join-Path $env:GITHUB_WORKSPACE 'validate-quick.json'
          & $env:GITHUB_WORKSPACE/tools/os-validate.ps1 -Profile quick -Json | Set-Content -LiteralPath $j -Encoding utf8
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - uses: actions/upload-artifact@v4
        with:
          name: validate-quick-${{ matrix.os }}
          path: validate-quick.json

      - name: Security posture + architectural fitness (advisory)
        shell: pwsh
        run: |
          # Advisory only — scores reported for visibility; hard-fail enabled once OS reaches steady-state
          & $env:GITHUB_WORKSPACE/tools/security-posture.ps1 -Json | ConvertFrom-Json | ForEach-Object {
            Write-Host "security-posture: $($_.status) score=$($_.findings[0].score)/100 grade=$($_.findings[0].grade)"
          }
          & $env:GITHUB_WORKSPACE/tools/architectural-fitness.ps1 -Json | ConvertFrom-Json | ForEach-Object {
            Write-Host "architectural-fitness: $($_.status) score=$($_.findings[0].fitnessScore)/100 grade=$($_.findings[0].fitnessGrade) cycles=$($_.findings[0].cycles)"
          }
          exit 0

      - name: Claude OS strict validation
        shell: pwsh
        run: |
          if ('${{ matrix.os }}' -eq 'ubuntu-latest') {
            & $env:GITHUB_WORKSPACE/tools/os-validate-all.ps1 -Strict -RequireBash
          } else {
            & $env:GITHUB_WORKSPACE/tools/os-validate-all.ps1 -Strict
          }

      - name: CI repair advisor (on failure)
        if: failure()
        shell: pwsh
        run: |
          $j = Join-Path $env:GITHUB_WORKSPACE 'validate-quick.json'
          $repairArgs = @()
          if (Test-Path -LiteralPath $j) { $repairArgs += @('-QuickJson', $j) }
          & $env:GITHUB_WORKSPACE/tools/ci-repair.ps1 @repairArgs
          exit 0
