# Validates Claude OS integrity, skills, docs, bootstrap behavior, and script syntax.
name: bootstrap-validate

permissions:
  contents: read

# Cancel redundant runs (saves CI minutes + queue latency on rapid pushes).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Claude OS health
        shell: pwsh
        run: ${{ github.workspace }}/tools/verify-os-health.ps1
