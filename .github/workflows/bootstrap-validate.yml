# Validates Claude OS integrity, schemas, skills, docs, bootstrap behavior, and runtime diagnostics.
name: bootstrap-validate

permissions:
  contents: read

# Cancel redundant runs (saves CI minutes + queue latency on rapid pushes).
# matrix.* is only valid inside a job; workflow-level group uses ref + workflow only.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Claude OS strict validation
        shell: pwsh
        run: |
          if ('${{ matrix.os }}' -eq 'ubuntu-latest') {
            & $env:GITHUB_WORKSPACE/tools/os-validate-all.ps1 -Strict -RequireBash
          } else {
            & $env:GITHUB_WORKSPACE/tools/os-validate-all.ps1 -Strict
          }
